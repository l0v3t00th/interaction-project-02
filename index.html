<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rear Window</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Bodoni:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stage-scaler">
    <div id="stage" aria-label="Rear Window collage">
        <h1 id="main-title">REAR<br>WINDOW</h1>

        <div class="window" id="win-1" data-tooltip="A neighbor sits at a desk, writing notes by lamplight.">
            <div class="window-frame"><img src="images/1.png" alt="" width="282" height="294" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/pulpfiction.gif"><p></p></div>
        </div>

        <div class="window" id="win-2" data-tooltip="Someone peers through an arched sash, half hidden by curtains.">
            <div class="window-frame"><img src="images/2.png" alt="" width="480" height="499" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/citizenkane.gif"><p></p></div>
        </div>

        <div class="window" id="win-3" data-tooltip="Four narrow panes show a figure crossing a dim corridor.">
            <div class="window-frame"><img src="images/3.png" alt="" width="562" height="360" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/soundofmusic.gif"><p></p></div>
        </div>

        <div class="window" id="win-4" data-tooltip="Stacked panes frame a silhouette climbing the fire escape.">
            <div class="window-frame"><img src="images/4.png" alt="" width="341" height="503" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/silenceoflambs.gif"><p></p></div>
        </div>

        <div class="window" id="win-5" data-tooltip="Shutters swing open; a face looks out toward the courtyard.">
            <div class="window-frame"><img src="images/5.png" alt="" width="415" height="592" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/citizenkane.gif"><p></p></div>
        </div>

        <div class="window" id="win-6" data-tooltip="A single square of glass catches the flash of a match.">
            <div class="window-frame"><img src="images/6.png" alt="" width="484" height="433" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/spaceodyssey.gif"><p></p></div>
        </div>

        <div class="window" id="win-7" data-tooltip="Wide shutters reveal a room lit for an evening party.">
            <div class="window-frame"><img src="images/7.png" alt="" width="393" height="418" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/singingintherain.gif"><p></p></div>
        </div>

        <div class="window" id="win-8" data-tooltip="Eight small panes show laundry drying above the alley.">
            <div class="window-frame"><img src="images/8.png" alt="" width="536" height="488" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/parasite.gif"><p></p></div>
        </div>

        <div class="window" id="win-9" data-tooltip="Behind iron bars, someone paces the narrow cell of light.">
            <div class="window-frame"><img src="images/9.png" alt="" width="307" height="378" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/clockworkorange.gif"><p></p></div>
        </div>

        <div class="window" id="win-10" data-tooltip="Three tall panes divide a couple arguing in silence.">
            <div class="window-frame"><img src="images/10.png" alt="" width="521" height="455" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/moderntimes.gif"><p></p></div>
        </div>

        <div class="window" id="win-11" data-tooltip="A long sill holds binoculars; a man sits watching the yard.">
            <div class="window-frame"><img src="images/11.png" alt="" width="436" height="542" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/metropolis.gif"><p></p></div>
        </div>

        <div class="window" id="win-12" data-tooltip="Arched glass frames a pianist’s hands on the keys.">
            <div class="window-frame"><img src="images/12.png" alt="" width="611" height="441" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/forrestgump.gif"><p></p></div>
        </div>

        <div class="window" id="win-13" data-tooltip="Eyes catch the light—someone stares straight back.">
            <div class="window-frame"><img src="images/13.png" alt="" width="410" height="613" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/jaws.gif"><p></p></div>
        </div>

        <div class="window" id="win-14" data-tooltip="A woman in profile adjusts her hair in the mirror.">
            <div class="window-frame"><img src="images/14.png" alt="" width="889" height="440" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/streetcarnameddesire.gif"><p></p></div>
        </div>

        <div class="window" id="win-15" data-tooltip="Sliding panels part; city haze spills into the room.">
            <div class="window-frame"><img src="images/15.png" alt="" width="467" height="373" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/oldboy.gif"><p></p></div>
        </div>

        <div class="window" id="win-16" data-tooltip="Four stacked panes trace someone reading by daylight.">
            <div class="window-frame"><img src="images/16.png" alt="" width="406" height="455" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/thegodfather.gif"><p></p></div>
        </div>

        <div class="window" id="win-17" data-tooltip="Eight panes form a grid of rooftops and antennae.">
            <div class="window-frame"><img src="images/17.png" alt="" width="576" height="591" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/rocky.gif"><p></p></div>
        </div>

        <div class="window" id="win-18" data-tooltip="A child presses both hands to the glass from inside.">
            <div class="window-frame"><img src="images/18.png" alt="" width="530" height="596" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/apocalypsenow.gif"><p></p></div>
        </div>

        <div class="window" id="win-19" data-tooltip="A narrow tower window shows a figure descending stairs.">
            <div class="window-frame"><img src="images/19.png" alt="" width="482" height="459" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/mulhollanddrive.gif"><p></p></div>
        </div>

        <div class="window" id="win-20" data-tooltip="Two tall panes split a body leaning on the frame.">
            <div class="window-frame"><img src="images/20.png" alt="" width="433" height="690" loading="lazy"></div>
            <div class="tooltip" role="tooltip"><img class="tooltip-gif" alt="" data-gif="gifs/to kill a mockingbird.gif"><p></p></div>
        </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
